<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">🏙️ Real Estate Dashboard</h1>

    <div class="card p-4 shadow-sm">

        <!-- Generate -->
        <form method="POST" action="/generate" class="mb-3">
            <label class="form-label">Select City</label>
            <select name="city" class="form-select">
                {% for city in cities %}
                    <option value="{{ city }}">{{ city }}</option>
                {% endfor %}
            </select>

            <button class="btn btn-primary mt-3 w-100">Generate Report</button>
        </form>

        <!-- Send -->
        <form method="POST" action="/send" class="mb-3">
            <label class="form-label">Send City Report</label>
            <select name="city" class="form-select">
                {% for city in cities %}
                    <option value="{{ city }}">{{ city }}</option>
                {% endfor %}
            </select>

            <button class="btn btn-success mt-3 w-100">Send Email</button>
        </form>

        <!-- Send All -->
        <form method="POST" action="/send_all">
            <button class="btn btn-dark w-100">Send ALL Reports</button>
        </form>

    </div>

</div>

</body>
</html>
